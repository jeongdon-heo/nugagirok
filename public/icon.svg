<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <g transform="translate(256,256)">
    <!-- Book shape -->
    <path d="M-120,-80 L-120,100 Q-120,120 -100,120 L100,120 Q120,120 120,100 L120,-80 Q120,-100 100,-100 L-100,-100 Q-120,-100 -120,-80 Z" fill="#E8D5B7" opacity="0.95"/>
    <!-- Book spine -->
    <line x1="0" y1="-100" x2="0" y2="120" stroke="#1a1a2e" stroke-width="3" opacity="0.2"/>
    <!-- Lines on book -->
    <line x1="-80" y1="-50" x2="-15" y2="-50" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="-80" y1="-20" x2="-15" y2="-20" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="-80" y1="10" x2="-15" y2="10" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="15" y1="-50" x2="80" y2="-50" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="15" y1="-20" x2="80" y2="-20" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="15" y1="10" x2="80" y2="10" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <!-- Pen -->
    <g transform="translate(50,30) rotate(30)">
      <rect x="-6" y="-60" width="12" height="80" rx="2" fill="#0f3460"/>
      <polygon points="-6,20 6,20 0,35" fill="#0f3460"/>
      <rect x="-6" y="-60" width="12" height="12" rx="2" fill="#E8D5B7" opacity="0.5"/>
    </g>
  </g>
</svg>
